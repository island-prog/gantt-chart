<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H1 2026 Services Tracker — Gantt Chart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaf0;--muted:#6b7280;--dim:#3d4455;
    --hist:#4f8ef7;  --hist-s:rgba(79,142,247,0.18);
    --fc:#34d399;    --fc-s:rgba(52,211,153,0.18);
    --sw:#f59e0b;    --sw-s:rgba(245,158,11,0.18);
    --sw-hist:#d97706;   --sw-hist-s:rgba(217,119,6,0.22);    /* darker amber — SW Historical */
    --sw-fc:#fbbf24;     --sw-fc-s:rgba(251,191,36,0.18);     /* lighter amber — SW Forecast */
    --dom:#e879f9;   --dom-s:rgba(232,121,249,0.18);
    --grey:#6b7280;   --grey-s:rgba(107,114,128,0.28);  /* Ferda Tech Updates */
    --freeze:#a78bfa;--prod:#fb923c;--pub:#f87171;
    --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
    --row-h:30px;--lw:262px;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);}

  .ph{padding:22px 28px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .pt{font-size:19px;font-weight:500;letter-spacing:-.02em;}
  .pt span{font-family:var(--mono);font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
  .pills{display:flex;gap:7px;flex-wrap:wrap;}
  .pill{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .pill-h{background:var(--hist-s);color:var(--hist);border:1px solid rgba(79,142,247,.3);}
  .pill-f{background:var(--fc-s);  color:var(--fc);  border:1px solid rgba(52,211,153,.3);}
  .pill-s{background:var(--sw-s);  color:var(--sw);  border:1px solid rgba(245,158,11,.3);}

  .leg-row{padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
  .lb{width:22px;height:8px;border-radius:2px;}
  .ll{width:18px;height:3px;border-radius:2px;}

  .scroll{overflow-x:auto;}
  .gantt{display:grid;grid-template-columns:var(--lw) 1fr;min-width:900px;}

  /* Month header */
  .mhdr{grid-column:1/-1;display:grid;grid-template-columns:var(--lw) 1fr;height:48px;position:sticky;top:0;z-index:30;background:var(--surface2);border-bottom:1px solid var(--border2);}
  .mstub{background:var(--surface2);border-right:1px solid var(--border);position:sticky;left:0;z-index:31;display:flex;align-items:flex-end;padding:0 12px 7px;font-size:10px;color:var(--muted);font-family:var(--mono);}
  .mrow-hdr{position:relative;overflow:hidden;}

  /* Section header */
  .shdr{grid-column:1/-1;display:grid;grid-template-columns:var(--lw) 1fr;height:30px;}
  .slbl{display:flex;align-items:center;padding:0 12px 0 14px;font-size:10px;font-weight:500;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;border-right:1px solid var(--border);position:sticky;left:0;z-index:12;}
  .stl{position:relative;}
  .shdr.h .slbl,.shdr.h .stl{background:rgba(79,142,247,.05);}
  .shdr.f .slbl,.shdr.f .stl{background:rgba(52,211,153,.05);}
  .shdr.s .slbl,.shdr.s .stl{background:rgba(245,158,11,.05);}
  .shdr.h .slbl{color:var(--hist);border-bottom:1px solid rgba(79,142,247,.25);}
  .shdr.f .slbl{color:var(--fc);  border-bottom:1px solid rgba(52,211,153,.25);}
  .shdr.s .slbl{color:var(--sw-hist); border-bottom:1px solid rgba(217,119,6,.3);}
  .shdr.h .stl{border-bottom:1px solid rgba(79,142,247,.25);}
  .shdr.f .stl{border-bottom:1px solid rgba(52,211,153,.25);}
  .shdr.s .stl{border-bottom:1px solid rgba(217,119,6,.3);}

  /* Task row */
  .grow{grid-column:1/-1;display:grid;grid-template-columns:var(--lw) 1fr;height:var(--row-h);border-bottom:1px solid var(--border);transition:background .1s;}
  .grow:hover{background:rgba(255,255,255,.022);}

  /* Milestone row */
  .mrow-ms{grid-column:1/-1;display:grid;grid-template-columns:var(--lw) 1fr;height:38px;border-top:1px solid;border-bottom:1px solid;}
  .mrow-ms.freeze{border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.07);}
  .mrow-ms.prod  {border-color:rgba(251,146,60,.3); background:rgba(251,146,60,.06);}
  .mrow-ms.pub   {border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.1);}

  .rlbl{display:flex;align-items:center;padding:0 10px 0 14px;font-size:11px;color:var(--muted);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;background:var(--bg);z-index:10;gap:6px;}
  .grow:hover .rlbl{background:#111419;}
  .bold{color:var(--text)!important;font-weight:500!important;}
  .mrow-ms .rlbl{font-size:11px;font-weight:500;position:sticky;left:0;z-index:10;}
  .mrow-ms.freeze .rlbl{background:rgba(167,139,250,.15);color:var(--freeze);border-right-color:rgba(167,139,250,.35);}
  .mrow-ms.prod   .rlbl{background:rgba(251,146,60,.12); color:var(--prod);  border-right-color:rgba(251,146,60,.3);}
  .mrow-ms.pub    .rlbl{background:rgba(248,113,113,.16);color:var(--pub);   border-right-color:rgba(248,113,113,.4);}
  .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .rtl{position:relative;overflow:visible;}

  /* BAR — solid fill */
  .bar{position:absolute;top:50%;transform:translateY(-50%);height:15px;border-radius:3px;
    cursor:default;transition:filter .15s;min-width:4px;}
  .bar:hover{filter:brightness(1.2);z-index:8;}
  .bh {background:var(--hist);}
  .bf {background:var(--fc);}
  .bs  {background:var(--sw);}
  .bsh-hist{background:var(--sw-hist);color:#1f0e00;}          /* SW Historical — solid dark amber */
  .bsh-fc  {background:var(--sw-fc); color:#1f1200;}           /* SW Forecast   — solid light amber */
  .bss-hist{background:var(--sw-hist-s);color:var(--sw-hist);border:1px solid rgba(217,119,6,.4);}
  .bss-fc  {background:var(--sw-fc-s);  color:var(--sw-fc);   border:1px solid rgba(251,191,36,.4);}
  .bd {background:var(--dom);}
  .bsh{background:var(--hist-s);border:1px solid rgba(79,142,247,.35);}
  .bsf{background:var(--fc-s);  border:1px solid rgba(52,211,153,.35);}
  .bss{background:var(--sw-s);  border:1px solid rgba(245,158,11,.35);}
  .bgrey{background:var(--grey-s);border:1px solid rgba(107,114,128,.45);}  /* Ferda Tech Updates — light grey */

  /* LABEL — always rendered, positioned by JS either inside or outside */
  .bar-label{
    position:absolute;top:50%;transform:translateY(-50%);
    font-family:var(--mono);font-size:9px;font-weight:500;
    white-space:nowrap;pointer-events:none;z-index:7;
    line-height:1;
  }
  .bar-label.inside { padding:0 5px; }
  .bar-label.outside{ padding-left:4px; }

  /* colour rules for labels */
  .bh  .bar-label.inside, .bar-label.inside.ch    { color:#0a1628; }
  .bf  .bar-label.inside, .bar-label.inside.cf    { color:#061c11; }
  .bs  .bar-label.inside, .bar-label.inside.cls-s    { color:#1f1200; }
  .bar-label.inside.cls-hist  { color:#1f0e00; }
  .bar-label.inside.cls-fc    { color:#1f1200; }
  .bd  .bar-label.inside, .bar-label.inside.cd    { color:#1a0320; }
  .bsh .bar-label.inside, .bar-label.inside.csh   { color:var(--hist); }
  .bsf .bar-label.inside, .bar-label.inside.csf   { color:var(--fc);   }
  .bss .bar-label.inside, .bar-label.inside.css   { color:var(--sw);   }

  .bar-label.outside.ch    { color:var(--hist); }
  .bar-label.outside.cf    { color:var(--fc);   }
  .bar-label.outside.cls-s    { color:var(--sw);      opacity:.8; }
  .bar-label.outside.cls-hist { color:var(--sw-hist); }
  .bar-label.outside.cls-fc   { color:var(--sw-fc);   }
  .bar-label.outside.cd    { color:var(--dom);  }
  .bar-label.outside.csh   { color:var(--hist); opacity:.8; }
  .bar-label.outside.csf   { color:var(--fc);   opacity:.8; }
  .bar-label.outside.css   { color:var(--sw);   opacity:.8; }
  .bar-label.outside.cgrey { color:var(--grey); opacity:.9; }
  .bar-label.inside.cgrey  { color:#1a1c22; }

  /* Milestone lines */
  .mline{position:absolute;top:0;bottom:0;width:2px;transform:translateX(-50%);pointer-events:none;z-index:3;}
  .mline.freeze{background:var(--freeze);box-shadow:0 0 7px rgba(167,139,250,.55);}
  .mline.prod  {background:var(--prod);  box-shadow:0 0 5px rgba(251,146,60,.45);}
  .mline.pub   {background:var(--pub);   box-shadow:0 0 9px rgba(248,113,113,.65);}
  .mdate{position:absolute;top:50%;transform:translate(8px,-50%);font-family:var(--mono);font-size:11px;font-weight:500;white-space:nowrap;z-index:4;}
  .mdate.freeze{color:var(--freeze);}
  .mdate.prod  {color:var(--prod);}
  .mdate.pub   {color:var(--pub);}
  .mshadow{position:absolute;top:0;bottom:0;width:1px;transform:translateX(-50%);pointer-events:none;opacity:.15;z-index:2;}

  /* Grid */
  .gl {position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
  .glm{background:var(--border2);}
  .mtick{position:absolute;bottom:0;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--muted);padding-bottom:5px;white-space:nowrap;}
  .mtick.main{color:var(--text);font-weight:500;font-size:11px;}

  /* Tooltip */
  .tip{position:fixed;z-index:200;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:9px 13px;font-size:11px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .1s;max-width:300px;line-height:1.55;}
  .tip.on{opacity:1;}
  .tip strong{display:block;margin-bottom:3px;font-weight:500;}
  .tip .td{font-family:var(--mono);font-size:10px;color:var(--pub);margin-bottom:3px;}
  .tip .dc{font-size:10.5px;color:var(--muted);}
</style>
</head>
<body>

<div class="ph">
  <div class="pt">
    <span>IDC Services Tracker · H1 2026</span>
    Master Release Schedule
  </div>
  <div class="pills">
    <span class="pill pill-h">Historical pub: 8 Oct 2026</span>
    <span class="pill pill-f">Forecast pub: 5 Nov 2026</span>
    <span class="pill pill-s">SW Hist pub: 19 Nov 2026</span>
    <span class="pill pill-s">SW FC pub: 3 Dec 2026</span>

</div>

<div class="leg-row">
  <div class="leg"><div class="lb" style="background:var(--hist)"></div>Historical Core</div>
  <div class="leg"><div class="lb" style="background:var(--fc)"></div>Forecast</div>
  <div class="leg"><div class="lb" style="background:var(--sw-hist)"></div>SW Historical</div>

  <div class="leg"><div class="lb" style="background:var(--dom)"></div>Domain analyst input</div>
  <div class="leg"><div class="lb" style="background:var(--hist-s);border:1px solid rgba(79,142,247,.35)"></div>Supporting / review</div>

  <div class="leg"><div class="ll" style="background:var(--freeze);box-shadow:0 0 4px rgba(167,139,250,.6)"></div>❄ Data Freeze</div>
  <div class="leg"><div class="ll" style="background:var(--prod);box-shadow:0 0 4px rgba(251,146,60,.5)"></div>⚙ Production</div>

<div class="scroll">
  <div class="gantt" id="gantt"></div>
</div>
<div class="tip" id="tip"></div>

<script>

// bar classes — solid | soft
const H='bh',F='bf',S='bs',DOM='bd',GREY='bgrey';
const SH='bsh',SF='bsf',SS='bss';

const CH='ch',CF='cf',CLS='cls-s',CD='cd',CLSH='csh',CLSF='csf',CLSS='css',CGREY='cgrey';

const FRZ='freeze',PRD='prod',PUB='pub';

const SECS=[

    rows:[

      {label:'Ferda Open and Project Kick off',             s:D(2026,6,4), e:D(2026,6,4), b:1, c:H, desc:'Historical Module Open + Kick off meeting Confirm team, goals, discuss potential enhancements, review housekeeping it... · 4 Jun'},
      {label:'Tool Training: Update (Company Status, New Vendor, Regio-country automation)',s:D(2026,6,19), e:D(2026,6,19), c:SH, desc:'Training all on updated or new trainings. · 19 Jun'},

// ── SCALE ──────────────────────────────────────────────────────────────────
const CS=D(2026,4,20), CE=D(2026,12,13);
const SPAN=(CE-CS)/864e5;  // total days = 234
const pct=dt=>((dt-CS)/864e5/SPAN*100).toFixed(4)+'%';
const pctNum=dt=>((dt-CS)/864e5/SPAN*100);
const wpctNum=(s,e)=>Math.max((e-s)/864e5,0.5)/SPAN*100;

const MONTHS=[];
for(let m=5;m<=12;m++) MONTHS.push({dt:D(2026,m,1),lbl:['','','','','','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]});
const WEEKS=[];
for(let m=5;m<=12;m++) [8,15,22].forEach(day=>WEEKS.push(D(2026,m,day)));

const gantt=document.getElementById('gantt');
const tip=document.getElementById('tip');

// Label width estimator (DM Mono ~6.3px/char at 9px)
const CHAR_W = 6.3;
function estimateLabelPx(text){ return text.length * CHAR_W + 10; }

// Convert % of timeline to px given container width
function getContainerWidth(){
  const tl = document.querySelector('.rtl');
  return tl ? tl.getBoundingClientRect().width : 600;
}

function addGrid(el){
  WEEKS.forEach(dt=>{const g=document.createElement('div');g.className='gl';g.style.cssText=`left:${pct(dt)};opacity:.4`;el.appendChild(g);});
  MONTHS.forEach(m=>{const g=document.createElement('div');g.className='gl glm';g.style.left=pct(m.dt);el.appendChild(g);});
}
const fmtD=dt=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
function showTip(e,html){tip.innerHTML=html;tip.classList.add('on');moveTip(e);}
function moveTip(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-46)+'px';}
function hideTip(){tip.classList.remove('on');}

// After DOM is built, position labels correctly based on actual widths
function positionLabels(){
  document.querySelectorAll('.bar-wrap').forEach(wrap=>{
    const bar   = wrap.querySelector('.bar');
    const lbl   = wrap.querySelector('.bar-label');
    if(!bar||!lbl) return;
    const containerW = wrap.getBoundingClientRect().width;
    if(containerW === 0) return;
    const leftPct  = parseFloat(bar.style.left);
    const widthPct = parseFloat(bar.style.width);
    const barPx    = widthPct / 100 * containerW;
    const lblPx    = estimateLabelPx(lbl.textContent);
    const rightPct = leftPct + widthPct;

    if(lblPx + 10 <= barPx){
      // fits inside bar
      lbl.style.left  = bar.style.left;
      lbl.style.width = bar.style.width;
      lbl.classList.add('inside');
      lbl.classList.remove('outside');
    } else {
      // always place to the right of bar
      lbl.style.left  = rightPct + '%';
      lbl.style.width = 'auto';
      lbl.classList.add('outside');
      lbl.classList.remove('inside');
    }
  });
}

// Month header
const mhEl=document.createElement('div');mhEl.className='mhdr';
mhEl.innerHTML=`<div class="mstub">step / milestone</div><div class="mrow-hdr" id="mr"></div>`;
gantt.appendChild(mhEl);
const mr=document.getElementById('mr');
addGrid(mr);
MONTHS.forEach(m=>{const t=document.createElement('div');t.className='mtick main';t.style.left=pct(m.dt);t.textContent=m.lbl;mr.appendChild(t);});

SECS.forEach(sec=>{
  // Section header
  const sh=document.createElement('div');sh.className=`shdr ${sec.cls}`;
  sh.innerHTML=`<div class="slbl">${sec.label}</div><div class="stl"></div>`;
  gantt.appendChild(sh);

  // Milestone rows
  sec.ms.forEach(ms=>{
    const row=document.createElement('div');row.className=`mrow-ms ${ms.cls}`;
    const lbl=document.createElement('div');lbl.className='rlbl';
    lbl.innerHTML=`<span style="font-size:14px;margin-right:2px">${ms.cls===PUB?'★':ms.cls===FRZ?'❄':'⚙'}</span>${ms.label.replace(/^[★❄⚙]\s*/,'')}`;
    row.appendChild(lbl);
    const tl=document.createElement('div');tl.className='rtl';tl.style.position='relative';
    addGrid(tl);
    const line=document.createElement('div');line.className=`mline ${ms.cls}`;line.style.left=pct(ms.date);tl.appendChild(line);
    const dl=document.createElement('div');dl.className=`mdate ${ms.cls}`;dl.style.left=pct(ms.date);
    dl.textContent=ms.date.toLocaleDateString('en-GB',{day:'numeric',month:'short'});tl.appendChild(dl);
    row.appendChild(tl);
    row.addEventListener('mouseenter',e=>showTip(e,`<strong>${ms.label}</strong><div class="td">${fmtD(ms.date)}</div><div class="dc">${ms.desc}</div>`));
    row.addEventListener('mousemove',moveTip);row.addEventListener('mouseleave',hideTip);
    gantt.appendChild(row);
  });

  // Task rows
  sec.rows.forEach(r=>{
    const row=document.createElement('div');row.className='grow';

    // Label column
    const lbl=document.createElement('div');lbl.className='rlbl'+(r.b?' bold':'');
    const dot=document.createElement('div');dot.className='dot';
    const isDom=r.c===DOM;
    const isSWHist = r.c==='bsh-hist'||r.c==='bss-hist';
    const isSWFc   = r.c==='bsh-fc' ||r.c==='bss-fc';
    dot.style.background = isDom ? 'var(--dom)'
      : isSWHist ? 'var(--sw-hist)'
      : isSWFc   ? 'var(--sw-fc)'
      : sec.cls==='h' ? 'var(--hist)'
      : sec.cls==='f' ? 'var(--fc)'
      : 'var(--sw)';
    if(!r.b) dot.style.opacity='0.4';
    lbl.appendChild(dot);lbl.appendChild(document.createTextNode(r.label));
    row.appendChild(lbl);

    // Timeline column — use a wrapper for overflow:visible
    const wrap=document.createElement('div');
    wrap.className='bar-wrap';
    wrap.style.cssText='position:relative;height:100%;overflow:visible;';

    addGrid(wrap);

    // Faint milestone shadow lines
    sec.ms.forEach(ms=>{
      const ml=document.createElement('div');ml.className='mshadow';
      ml.style.left=pct(ms.date);
      ml.style.background=ms.cls===PUB?'var(--pub)':ms.cls===FRZ?'var(--freeze)':'var(--prod)';
      wrap.appendChild(ml);
    });

    // Optional dotted bar (drawn first so it sits behind main bar)
    if(r.opt){
      const optEl=document.createElement('div');optEl.className=`bar bar-opt ${r.c}`;
      optEl.style.left=pctNum(r.opt.s).toFixed(4)+'%';
      optEl.style.width=wpctNum(r.opt.s,r.opt.e).toFixed(4)+'%';
      optEl.style.height='15px';
      optEl.style.opacity='0.35';
      optEl.style.backgroundImage='radial-gradient(circle, currentColor 1.5px, transparent 1.5px)';
      optEl.style.backgroundSize='6px 6px';
      optEl.style.backgroundColor='transparent';
      optEl.style.border='1px dashed currentColor';
      optEl.style.borderRadius='3px';
      // colour the dots to match bar colour
      const optColor = r.c===H?'var(--hist)':r.c===F?'var(--fc)':'var(--dom)';
      optEl.style.color=optColor;
      wrap.appendChild(optEl);
      // Optional bar short label (e.g. B1, B2, B3)
      if(r.opt.label){
        const optLbl=document.createElement('div');
        optLbl.style.cssText=`position:absolute;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;font-weight:500;white-space:nowrap;pointer-events:none;z-index:8;padding-left:4px;opacity:0.6;color:${optColor};left:${pctNum(r.opt.s).toFixed(4)}%`;
        optLbl.textContent=r.opt.label;
        wrap.appendChild(optLbl);
      }
      optEl.addEventListener('mouseenter',e=>showTip(e,`<strong>${r.label} — Optional Update</strong><div class="td">${fmtD(r.opt.s)} → ${fmtD(r.opt.e)}</div><div class="dc">${r.opt.desc}</div>`));
      optEl.addEventListener('mousemove',moveTip);
      optEl.addEventListener('mouseleave',hideTip);
    }

    // Bar
    const barEl=document.createElement('div');barEl.className=`bar ${r.c}`;
    const leftP = pctNum(r.s).toFixed(4)+'%';
    const widP  = wpctNum(r.s,r.e).toFixed(4)+'%';
    barEl.style.left=leftP;
    barEl.style.width=widP;
    wrap.appendChild(barEl);

    // Short label pinned inside the solid bar (e.g. B1, B2, B3)
    if(r.opt && r.opt.label){
      const pinEl=document.createElement('div');
      pinEl.style.cssText=`position:absolute;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;font-weight:500;white-space:nowrap;pointer-events:none;z-index:9;padding:0 5px;color:#0a1628;left:${leftP};width:${widP};text-align:center;overflow:hidden;`;
      pinEl.textContent=r.opt.label;
      wrap.appendChild(pinEl);
    }

    // Label — always created, positioned after paint
    const lblEl=document.createElement('div');
    lblEl.className=`bar-label ${barColour[r.c]||''}`;
    lblEl.textContent=r.label;
    wrap.appendChild(lblEl);

    // Tooltip on both bar and label
    [barEl, lblEl].forEach(el=>{
      el.addEventListener('mouseenter',e=>showTip(e,`<strong>${r.label}</strong><div class="td">${fmtD(r.s)} → ${fmtD(r.e)}</div><div class="dc">${r.desc||''}</div>`));
      el.addEventListener('mousemove',moveTip);
      el.addEventListener('mouseleave',hideTip);
    });

    row.appendChild(wrap);
    gantt.appendChild(row);
  });
});

// Position labels after first paint and on resize
requestAnimationFrame(()=>{ positionLabels(); });
window.addEventListener('resize', positionLabels);
</script>
